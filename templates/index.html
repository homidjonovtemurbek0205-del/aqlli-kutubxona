<!-- Har bitta kitob kartasining ichidagi tugmalar bo'limi -->
<div class="book-actions" style="margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
    
    <!-- 📖 Kitobni o'qish tugmasi -->
    <a href="/read/{{ book.id }}" class="btn-action btn-read-online">
        <span class="icon">📖</span> Kitobni o'qish
    </a>

    <!-- 🎧 Kitobni tinglash tugmasi -->
    <button class="btn-action btn-listen" onclick="readAloud('{{ book.title }}. {{ book.description }}')">
        <span class="icon">🎧</span> Kitobni tinglash
    </button>
    
</div>

<!-- CHIROYLI NEON ANIMATSIYALAR UCHUN CSS STYLES (Faylning <head> qismiga qo'shing) -->
<style>
.btn-action {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 30px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
}

.btn-read-online {
    background: linear-gradient(135deg, #03dac6, #018786);
    color: #121212;
}

.btn-read-online:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 8px 25px rgba(3, 218, 198, 0.6);
}

.btn-listen {
    background: linear-gradient(135deg, #bb86fc, #6200ee);
    color: #ffffff;
}

.btn-listen:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 8px 25px rgba(187, 134, 252, 0.6);
}

.btn-action:hover .icon {
    animation: pulseIcon 0.8s infinite alternate;
}

@keyframes pulseIcon {
    0% { transform: scale(1); }
    100% { transform: scale(1.3); }
}
</style>

<!-- OVOZLI O'QISH JAVASCRIPT KODI (Faylning eng pastiga, </body>dan tepaga qo'shing) -->
<script>
function readAloud(text) {
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
        window.speechSynthesis.cancel();
    }
    window.speechSynthesis.resume();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'uz-UZ'; 
    utterance.pitch = 1.0; 
    utterance.rate = 0.95; 

    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        const uzVoice = voices.find(v => v.lang.includes('uz') || v.lang.includes('tr'));
        if (uzVoice) utterance.voice = uzVoice;
    }
    window.speechSynthesis.speak(utterance);
}
if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
}
</script>
